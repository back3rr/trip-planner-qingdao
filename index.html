<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Thanh Đảo 青島 · 23–27/4/2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Borel&display=swap');

:root {
  --bg: #0e1117; --card: #1e2535; --border: #2a3347; --surface: #161b26;
  --a23: #4a9eff; --a24: #2ecc8a; --a25: #ff7c4a; --a26: #f5c842; --a27: #c97fff; --asnack: #ff6b9d;
  --text: #e8edf5; --muted: #8896b0;
  --hdr-h: 88px;
  --map-h: 50vh;
  --sheet-h: calc(50vh - var(--hdr-h) + 100vh - 50vh);
}
body.light {
  --bg: #f0f4f8; --card: #ffffff; --border: #d0d8e8; --surface: #e4eaf4;
  --text: #1a2235; --muted: #6b7a99;
  --a23: #1a7de0; --a24: #1a9966; --a25: #d95a25; --a26: #b08a00; --a27: #8b3ecf; --asnack: #d42060;
}

@keyframes sk { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-size: 17px; }

/* ══ HEADER ══ */
.hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 400;
  background: linear-gradient(135deg, rgba(14,17,23,0.78), rgba(20,28,46,0.82));
  backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
  padding: 16px 16px 0; border-bottom: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 -1px 0 rgba(255,255,255,0.06);
}
.hdr-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.ttl {
  font-family: 'Borel', cursive; font-size: 22px; font-weight: 800;
  letter-spacing: -.5px; margin-bottom: -16px;
  background: linear-gradient(90deg, #4a9eff, #c97fff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
.wbadge {
  background: linear-gradient(135deg, rgba(74,158,255,0.15), rgba(201,127,255,0.1));
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-radius: 20px; padding: 0 12px; height: 34px; display: flex; align-items: center; font-size: 14px; color: var(--text);
  box-shadow: 0 4px 20px rgba(74,158,255,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
}
.theme-btn {
  width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15);
  background: linear-gradient(135deg, rgba(74,158,255,0.15), rgba(201,127,255,0.1));
  backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
  box-shadow: 0 4px 20px rgba(74,158,255,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
.theme-btn:active { transform: scale(.9); }
body.light .hdr {
  background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(248,250,255,0.65));
  border-bottom: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 4px 24px rgba(0,0,0,0.1), inset 0 -1px 0 rgba(0,0,0,0.05);
}
body.light .sheet {
  background: rgba(255,255,255,0.6);
  border-top: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.8);
}
body.light #mainMap { filter: brightness(1) saturate(1); }
body.light .wbadge {
  background: rgba(255,255,255,0.8);
  border: 1px solid rgba(0,0,0,0.12);
  box-shadow: none;
}
body.light .theme-btn {
  background: rgba(255,255,255,0.8);
  border: 1px solid rgba(0,0,0,0.12);
  box-shadow: none;
}
body.light .d23 .sheet-gmap-btn { background: linear-gradient(135deg, #4a9eff, #2d7fd4); }
body.light .d24 .sheet-gmap-btn { background: linear-gradient(135deg, #2ecc8a, #22a870); }
body.light .d25 .sheet-gmap-btn { background: linear-gradient(135deg, #ff7c4a, #e05e2e); }
body.light .d26 .sheet-gmap-btn { background: linear-gradient(135deg, #f5c842, #d4a820); color: #1a1000; }
body.light .d27 .sheet-gmap-btn { background: linear-gradient(135deg, #c97fff, #a855e0); }

/* ══ TABS ══ */
.tabs { display: flex; gap: 4px; overflow: visible; }
.tab {
  flex: 1; min-width: 0; padding: 7px 4px; border-radius: 9px 9px 0 0;
  font-size: 12px; font-weight: 700; cursor: pointer; line-height: 1.4;
  color: var(--muted); background: transparent; border: none;
  border: 1px solid transparent; border-bottom: none;
  position: relative; top: 1px; text-align: center;
  transition: all .2s;
}
.tab.active { color: var(--text); border-color: var(--border); }
.tab[data-d="23"].active { background: rgba(74,158,255,0.12); border-top: 2px solid var(--a23); color: var(--a23); }
.tab[data-d="24"].active { background: rgba(46,204,138,0.12); border-top: 2px solid var(--a24); color: var(--a24); }
.tab[data-d="25"].active { background: rgba(255,124,74,0.12); border-top: 2px solid var(--a25); color: var(--a25); }
.tab[data-d="26"].active { background: rgba(245,200,66,0.12); border-top: 2px solid var(--a26); color: var(--a26); }
.tab[data-d="27"].active { background: rgba(201,127,255,0.12); border-top: 2px solid var(--a27); color: var(--a27); }
.tab[data-d="snack"].active { background: rgba(255,107,157,0.12); border-top: 2px solid var(--asnack); color: var(--asnack); }

/* ══ MAP — exactly 50vh below header ══ */
.map-wrap {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: calc(50vh + var(--hdr-h));
  z-index: 1;
}
#mainMap {
  width: 100%; height: 100%;
  filter: brightness(.88) saturate(.75);
}

/* ══ SHEET HEADER ROW ══ */
.day-info {
  width: 100%; padding-bottom: 10px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
}
.day-info-text { flex: 1; min-width: 0; }
.dlbl { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
.dtitle { font-family: 'Borel', cursive; font-size: 20px; font-weight: 800; margin-top: 6px; margin-bottom: -12px; }
.ddesc { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; }

.sheet-gmap-btn {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 5px;
  padding: 8px 12px; border-radius: 10px;
  font-size: 12px; font-weight: 700;
  text-decoration: none; color: #fff;
  transition: transform .15s, box-shadow .15s; margin-top: 2px;
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
}
.sheet-gmap-btn:active { transform: scale(.95); }
.d23 .sheet-gmap-btn { background: linear-gradient(135deg, rgba(74,158,255,0.75), rgba(74,158,255,0.5)); box-shadow: 0 4px 16px rgba(74,158,255,0.35), inset 0 1px 0 rgba(255,255,255,0.15); }
.d24 .sheet-gmap-btn { background: linear-gradient(135deg, rgba(46,204,138,0.75), rgba(46,204,138,0.5)); box-shadow: 0 4px 16px rgba(46,204,138,0.35), inset 0 1px 0 rgba(255,255,255,0.15); }
.d25 .sheet-gmap-btn { background: linear-gradient(135deg, rgba(255,124,74,0.75), rgba(255,124,74,0.5)); box-shadow: 0 4px 16px rgba(255,124,74,0.35), inset 0 1px 0 rgba(255,255,255,0.15); }
.d26 .sheet-gmap-btn { background: linear-gradient(135deg, rgba(245,200,66,0.75), rgba(245,200,66,0.5)); box-shadow: 0 4px 16px rgba(245,200,66,0.35), inset 0 1px 0 rgba(255,255,255,0.15); color: #1a1000; }
.d27 .sheet-gmap-btn { background: linear-gradient(135deg, rgba(201,127,255,0.75), rgba(201,127,255,0.5)); box-shadow: 0 4px 16px rgba(201,127,255,0.35), inset 0 1px 0 rgba(255,255,255,0.15); }
body.light .d23 .sheet-gmap-btn { box-shadow: 0 2px 8px rgba(74,158,255,0.2), inset 0 1px 0 rgba(255,255,255,0.3); }
body.light .d24 .sheet-gmap-btn { box-shadow: 0 2px 8px rgba(46,204,138,0.2), inset 0 1px 0 rgba(255,255,255,0.3); }
body.light .d25 .sheet-gmap-btn { box-shadow: 0 2px 8px rgba(255,124,74,0.2), inset 0 1px 0 rgba(255,255,255,0.3); }
body.light .d26 .sheet-gmap-btn { box-shadow: 0 2px 8px rgba(245,200,66,0.2), inset 0 1px 0 rgba(255,255,255,0.3); }
body.light .d27 .sheet-gmap-btn { box-shadow: 0 2px 8px rgba(201,127,255,0.2), inset 0 1px 0 rgba(255,255,255,0.3); }
.sheet {
  position: fixed;
  top: var(--hdr-h); left: 0; right: 0; bottom: 0;
  transform: translateY(calc(100vh - var(--hdr-h) - 50vh));
  transition: transform .38s cubic-bezier(.32,1,.52,1);
  will-change: transform;
  z-index: 200;
  border-radius: 20px 20px 0 0;
  background: rgba(14,17,23,0.80);
  backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%);
  border-top: 1px solid rgba(255,255,255,0.1);
  display: none;
  flex-direction: column;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
}
.sheet.visible { display: flex; }
.sheet.expanded { transform: translateY(0); }

/* drag handle */
.handle-zone {
  flex-shrink: 0; padding: 10px 16px 0;
  cursor: grab; user-select: none;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.handle-zone:active { cursor: grabbing; }
.handle-bar { width: 36px; height: 4px; border-radius: 2px; background: var(--border); }

/* scrollable body */
.sheet-body {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 0 14px 40px;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}

/* ══ STOPS ══ */
.slbl { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); margin: 14px 0 7px; display: flex; align-items: center; gap: 8px; }
.slbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.stops { display: flex; flex-direction: column; gap: 2px; }
.stop {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 11px 11px 11px 14px; display: flex; gap: 10px;
  position: relative; overflow: hidden; cursor: pointer;
  transition: background .15s;
  user-select: none; -webkit-user-select: none;
}
.stop::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.stop:active { background: #232d40; }
body.light .stop:active { background: rgba(0,0,0,0.04); }
.d23 .stop::before { background: var(--a23); } .d24 .stop::before { background: var(--a24); }
.d25 .stop::before { background: var(--a25); } .d26 .stop::before { background: var(--a26); }
.d27 .stop::before { background: var(--a27); }
.dsnack .stop::before { background: var(--asnack); }
.dsnack .stop + .stop { margin-top: 10px; }
.add-stop-btn {
  flex-shrink: 0; display: flex; align-items: center; gap: 5px;
  padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 700;
  color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%);
  background: linear-gradient(135deg, rgba(255,107,157,0.75), rgba(255,107,157,0.5));
  box-shadow: 0 4px 16px rgba(255,107,157,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
  transition: transform .15s; margin-top: 2px; font-family: inherit;
}
body.light .add-stop-btn {
  background: linear-gradient(135deg, #ff6b9d, #d42060);
  box-shadow: 0 2px 8px rgba(255,107,157,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
}
.add-stop-btn:active { transform: scale(.95); }
.add-modal-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.add-modal-overlay.open { opacity: 1; pointer-events: auto; }
.add-modal {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 10px 20px calc(28px + env(safe-area-inset-bottom));
  display: flex; flex-direction: column; gap: 12px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
}
.add-modal-overlay.open .add-modal { transform: translateY(0); }
.add-modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 4px; }
.add-modal-title { font-family: 'Borel', cursive; font-size: 20px; color: var(--text); }
.add-modal input {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 0 16px; height: 48px; font-size: 16px; color: var(--text); width: 100%;
  outline: none; font-family: inherit; box-sizing: border-box; -webkit-appearance: none; appearance: none;
}
.add-modal input::placeholder { color: var(--muted); }
.add-modal-row { display: flex; gap: 8px; }
.add-modal-row input { flex: 1; }
.add-modal-hint { font-size: 11px; color: var(--muted); }
.add-field { display: flex; flex-direction: column; gap: 6px; }
.add-field-msg { font-size: 12px; min-height: 16px; line-height: 1; }
.add-field-msg.error { color: #ff4757; }
.add-field-msg.warn { color: #f5c842; }
.add-modal input.invalid { border-color: #ff4757; }
.add-modal-actions { display: flex; gap: 10px; margin-top: 4px; }
.add-modal-cancel { flex: 1; height: 50px; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
.add-modal-save { flex: 2; height: 50px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, #ff6b9d, #d42060); border: none; color: #fff; }
.snum { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.d23 .snum { background: rgba(74,158,255,.15); color: var(--a23); }
.d24 .snum { background: rgba(46,204,138,.15); color: var(--a24); }
.d25 .snum { background: rgba(255,124,74,.15); color: var(--a25); }
.d26 .snum { background: rgba(245,200,66,.15); color: var(--a26); }
.d27 .snum { background: rgba(201,127,255,.15); color: var(--a27); }
.dsnack .snum { background: rgba(255,107,157,.15); color: var(--asnack); }
.sbody { flex: 1; min-width: 0; }
.stime { font-size: 11px; color: var(--muted); margin-bottom: 1px; font-weight: 600; }
.sname { font-size: 14px; font-weight: 700; line-height: 1.3; margin-top: 4px; }
.scn { font-size: 12px; color: var(--muted); margin-top: 6px; }
.snote { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
.sico { font-size: 12px; margin-left: 4px; margin-right: 4px; opacity: .8; }
.smeta { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.b { font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
.bs { background: rgba(245,200,66,.15); color: #f5c842; border: 1px solid rgba(245,200,66,.3); }
.bm { background: rgba(255,80,80,.15);  color: #ff6060; border: 1px solid rgba(255,80,80,.3); }
.bf { background: rgba(46,204,138,.15); color: var(--a24); border: 1px solid rgba(46,204,138,.3); }
.bt { background: rgba(74,158,255,.15); color: var(--a23); border: 1px solid rgba(74,158,255,.3); }
.bb { background: rgba(201,127,255,.15);color: var(--a27); border: 1px solid rgba(201,127,255,.3); }
.bx { background: rgba(255,124,74,.15); color: var(--a25); border: 1px solid rgba(255,124,74,.3); }
.sgmap { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; flex-shrink: 0; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); text-decoration: none; margin-top: 1px; align-self: flex-start; }
button.sgmap { cursor: pointer; padding: 0; font-family: inherit; }
.sgmap svg { width: 14px; height: 14px; }
.trow { display: flex; align-items: center; gap: 8px; padding: 4px 8px; color: var(--muted); font-size: 11px; }
.trow::before, .trow::after { content: ''; flex: 1; height: 1px; background: var(--border); opacity: .4; }
.tips { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-top: 14px; }
.ttip { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 7px; }
.tip { font-size: 12px; line-height: 1.6; color: var(--muted); padding: 3px 0; border-bottom: 1px solid var(--border); }
.tip:last-child { border-bottom: none; }
.tip span { color: var(--text); font-weight: 600; }
.jcard { background: linear-gradient(135deg,#1a1a0e,#1e1a08); border: 1px solid rgba(245,200,66,.3); border-radius: 14px; padding: 18px; text-align: center; }
.jicon { font-size: 36px; margin-bottom: 7px; }
.jtitle { font-family: 'Borel', cursive; font-size: 19px; font-weight: 800; color: #f5c842; margin-bottom: -5px; }
.jsub { font-size: 12px; color: var(--muted); line-height: 1.6; }
.jlinks { display: flex; gap: 8px; margin-top: 11px; justify-content: center; flex-wrap: wrap; }
.jl { padding: 8px 13px; border-radius: 10px; font-size: 12px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 5px; }
.jp { background: #f5c842; color: #1a1000; }
.js { background: var(--card); color: var(--text); border: 1px solid var(--border); }

/* Leaflet popup dark */
.leaflet-popup-content-wrapper { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 10px; font-family: 'Noto Sans SC', sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,.6); }
.leaflet-popup-tip { background: var(--card); }
.leaflet-popup-content { font-size: 12px; line-height: 1.5; margin: 8px 12px; }
.popup-name { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
.popup-time { color: #8896b0; font-size: 12px; }
.leaflet-container a.leaflet-popup-close-button { color: #8896b0; }

/* ══ TOAST ══ */
.toast {
  position: fixed; top: calc(var(--hdr-h) + 12px); left: 50%;
  transform: translateX(-50%) translateY(-6px);
  background: linear-gradient(135deg, rgba(26,33,50,0.97), rgba(18,24,42,0.97));
  color: #e8edf5; font-size: 13px; font-weight: 600;
  padding: 8px 18px; border-radius: 20px; z-index: 20000;
  opacity: 0; transition: opacity .2s, transform .2s;
  pointer-events: none; white-space: nowrap;
  border: 1px solid rgba(74,158,255,0.4);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 4px 20px rgba(74,158,255,0.2);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="ttl">Thanh Đảo 青島</div>
      <div class="sub">23–27 tháng 4, 2026 · Gia đình</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="wbadge" id="wbadge" style="min-width:72px;color:var(--border);background:linear-gradient(90deg,var(--card) 25%,var(--border) 50%,var(--card) 75%);background-size:200% 100%;animation:sk 1.2s infinite">···</div>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" data-d="23" onclick="sw('23')">N1<br><small>23/4</small></div>
    <div class="tab"        data-d="24" onclick="sw('24')">N2<br><small>24/4</small></div>
    <div class="tab"        data-d="25" onclick="sw('25')">N3<br><small>25/4</small></div>

// ── GCJ-02 → WGS-84 conversion ──
// Google Maps URLs in China encode coords as GCJ-02 (Mars Coords).
// OSM/CartoDB tiles use WGS-84. Convert before placing markers.
function gcj2wgs(lat, lng) {
  const a = 6378245.0, ee = 0.00669342162296594323;
  const PI = Math.PI;
  function tLat(x, y) {
    let r = -100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));
    r += (20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;
    r += (20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;
    r += (160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;
    return r;
  }
  function tLng(x, y) {
    let r = 300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));
    r += (20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;
    r += (20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;
    r += (150*Math.sin(x/12*PI)+300*Math.sin(x*PI/30))*2/3;
    return r;
  }
  const dlat = tLat(lng-105, lat-35);
  const dlng = tLng(lng-105, lat-35);
  const radlat = lat/180*PI;
  let magic = Math.sin(radlat);
  magic = 1 - ee*magic*magic;
  const sq = Math.sqrt(magic);
  const dlatR = dlat*180/((a*(1-ee))/(magic*sq)*PI);
  const dlngR = dlng*180/(a/sq*Math.cos(radlat)*PI);
  return [lat - dlatR, lng - dlngR];
}

async function loadTripData() {

    sb.from('stops').select('*').order('stop_number'),
    sb.from('trows').select('*').order('after_stop')
  ]);

  const days = daysRes.data;

  for (const day of days) {
    stopsByDay[day.id] = (stopsRes.data || []).filter(s => s.day_id === day.id);

    for (const t of (trowsRes.data || []).filter(t => t.day_id === day.id)) tmap[t.after_stop] = t.content;
    trowsByDay[day.id] = tmap;
  }
  return { days, stopsByDay, trowsByDay };
}

function buildDaysMap(days, stopsByDay) {

}

function timeSection(timeLabel) {

  return 'TỐI';
}

function renderSheetBody(dayKey, stops, trowMap) {
  let html = '';

  for (const stop of stops) {
    const section = timeSection(stop.time_label);

      if (lastSection !== null) html += '</div>';
      html += `<div class="slbl">${section}</div><div class="stops">`;
      lastSection = section;
    } else if (section && lastSection === null) {
      html += `<div class="slbl">${section}</div><div class="stops">`;
      lastSection = section;
    }
    html += renderStop(stop, trowMap[stop.stop_number], dayKey === 'snack');
  }
  if (lastSection !== null) html += '</div>';
  if (dayKey === '27') html += renderDay27Tips();
  return html;
}

// ── SHEET DRAG ──
let activeDay = '23';
let activeSheet = null;
let expanded = false;
let dragging = false;
let startY = 0;

function measureHdr() {
  const hdrH = document.querySelector('.hdr').offsetHeight;
  document.documentElement.style.setProperty('--hdr-h', hdrH + 'px');
  return hdrH;
}

function getCollapsedY(sheet) {
  // sheet.offsetHeight = 100vh - hdrH (actual pixels)
  // collapsed: show 50vh → translateY = sheetH - 50vh
  return sheet.offsetHeight - window.innerHeight * 0.5;
}

function getExpandedY() {
  return 0; // translateY(0): sheet top = 100vh - sheetH = hdrH ✓
}

function expand(sheet, yes) {
  sheet.style.transition = 'transform .38s cubic-bezier(.32,1,.52,1)';
  if (yes) {
    sheet.style.transform = 'translateY(0)';
  } else {
    sheet.style.transform = `translateY(${getCollapsedY(sheet)}px)`;
    sheet.querySelector('.sheet-body').scrollTop = 0;
  }
  expanded = yes;
}

function initSheet(d) {
  const sheet = document.getElementById('s' + d);
  const hz = document.getElementById('hz' + d);
  const body = sheet.querySelector('.sheet-body');
  if (sheet._dragInit) return sheet;
  sheet._dragInit = true;

  function start(y) { startY = y; dragging = false; sheet.style.transition = 'none'; }
  function move(y) {
    const dy = y - startY;
    if (!dragging) {
      if (Math.abs(dy) < 5) return;
      dragging = true;
    }
    const colY = getCollapsedY(sheet);
    if (expanded) {
      if (dy > 0) sheet.style.transform = `translateY(${Math.min(colY, dy)}px)`;
    } else {
      if (dy < 0) sheet.style.transform = `translateY(${Math.max(0, colY + dy)}px)`;
    }
  }
  function end(y) {
    if (!dragging) return;
    const dy = y - startY;
    expand(sheet, expanded ? dy < 60 : dy < -50);
    dragging = false;
  }

  // Handle zone: always drag to expand/collapse
  hz.addEventListener('touchstart', e => start(e.touches[0].clientY), {passive:true});
  hz.addEventListener('touchmove', e => { e.preventDefault(); move(e.touches[0].clientY); }, {passive:false});
  hz.addEventListener('touchend', e => end(e.changedTouches[0].clientY));
  hz.addEventListener('mousedown', e => start(e.clientY));
  document.addEventListener('mousemove', e => { if (dragging) move(e.clientY); });
  document.addEventListener('mouseup', e => { if (dragging) end(e.clientY); });

  // Body touch:
  // - Collapsed: kéo lên bất kỳ đâu để expand
  // - Expanded: kéo xuống chỉ khi đã ở đầu nội dung (scrollTop=0) mới collapse
  let bodyTouchY = 0;
  let bodyScrollTop0 = 0;
  let bodyMode = null; // 'sheet' | 'scroll'

  body.addEventListener('touchstart', e => {
    bodyTouchY = e.touches[0].clientY;
    bodyScrollTop0 = body.scrollTop;
    bodyMode = null;
    if (!expanded) start(e.touches[0].clientY);
  }, {passive:true});

  body.addEventListener('touchmove', e => {
    const dy = e.touches[0].clientY - bodyTouchY;
    if (bodyMode === null && Math.abs(dy) > 5) {
      if (!expanded) {
        bodyMode = dy < 0 ? 'sheet' : 'scroll';
      } else {
        bodyMode = (dy > 0 && bodyScrollTop0 === 0) ? 'sheet' : 'scroll';
        if (bodyMode === 'sheet') start(bodyTouchY);
      }
    }
    if (bodyMode === 'sheet') {
      e.preventDefault();
      move(e.touches[0].clientY);
    }
  }, {passive:false});

  body.addEventListener('touchend', e => {
    if (bodyMode === 'sheet' && dragging) end(e.changedTouches[0].clientY);
    bodyMode = null;
  });

  hz.addEventListener('click', () => { if (!dragging) expand(sheet, !expanded); });
  return sheet;
}

function sw(d) {
  // hide current
  if (activeSheet) { activeSheet.style.display = 'none'; }
  // update tabs
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-d="${d}"]`).classList.add('active');
  activeDay = d;
  expanded = false;
  // show new sheet
  const sheet = document.getElementById('s' + d);
  sheet.style.display = 'flex';
  const colY = getCollapsedY(sheet);
  sheet.style.transition = 'none';
  sheet.style.transform = `translateY(${colY}px)`;
  activeSheet = initSheet(d);
  loadDay(d);
}

  fetch('https://api.open-meteo.com/v1/forecast?latitude=36.067&longitude=120.322&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Asia%2FShanghai&forecast_days=1')
    .then(r => r.json())
    .then(d => {
      clearSkeleton();
      const min = Math.round(d.daily.temperature_2m_min[0]);
      const max = Math.round(d.daily.temperature_2m_max[0]);
      badge.textContent = `${weatherEmoji(d.daily.weathercode[0])} ${min}–${max}°C`;
    })
    .catch(() => { clearSkeleton(); badge.textContent = '— °C'; });
})();

// ── THEME TOGGLE ──
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  const theme = isLight ? 'light' : 'dark';
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('theme', theme);
  switchMapTiles(theme);
}
(function() {
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = '☀️';
    switchMapTiles('light');
  }
})();

// Re-measure on resize
window.addEventListener('resize', () => {
  measureHdr();
  if (activeSheet) {
    if (!expanded) activeSheet.style.transform = `translateY(${getCollapsedY(activeSheet)}px)`;
  }
  map.invalidateSize();
});

// ── ADD / EDIT STOP (Ăn vặt tab) ──
const SAVE_PIN = '2110';
let _saveStep = 0;
let _pinCallback = null;
let _editId = null;

// ── PIN MODAL ──
function openPinModal(callback) {
  _pinCallback = callback;
  const input = document.getElementById('pinInput');
  input.value = '';
  const msg = document.getElementById('pinInputMsg');
  msg.textContent = ''; msg.className = 'add-field-msg';
  input.classList.remove('invalid');
  document.getElementById('pinModal').classList.add('open');
  setTimeout(() => input.focus(), 380);
}
function closePinModal() {
  document.getElementById('pinModal').classList.remove('open');
  _pinCallback = null;
}
async function confirmPin() {
  const pin = document.getElementById('pinInput').value.trim();
  const msg = document.getElementById('pinInputMsg');
  if (pin !== SAVE_PIN) {
    msg.textContent = 'PIN không đúng'; msg.className = 'add-field-msg error';
    document.getElementById('pinInput').classList.add('invalid');
    return;
  }
  const cb = _pinCallback;
  closePinModal();
  if (cb) await cb();
}

// ── ADD STOP ──
function openAddStop() {
  ['asName','asCn','asNote','asAddr','asGmap','asLat','asLng'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  ['asNameMsg','asGmapMsg','asLatMsg'].forEach(id => {
    const el = document.getElementById(id); if (el) { el.textContent = ''; el.className = 'add-field-msg'; }
  });
  document.getElementById('asName').classList.remove('invalid');
  document.querySelector('#addModal .add-modal-save').textContent = 'Lưu';
  _saveStep = 0;
  document.getElementById('addModal').classList.add('open');
}
function closeAddStop() {
  document.getElementById('addModal').classList.remove('open');
  _saveStep = 0;
}
function tryExtractLatLng(url) {
  const m = url.match(/!3d(-?\d+\.?\d*)!4d(-?\d+\.?\d*)/);
  if (m) {
    document.getElementById('asLat').value = m[1];
    document.getElementById('asLng').value = m[2];
    document.getElementById('asLatMsg').textContent = '';
    document.getElementById('asLatMsg').className = 'add-field-msg';
  }
}
function validateName() {
  const val = document.getElementById('asName').value.trim();
  const msg = document.getElementById('asNameMsg');
  const input = document.getElementById('asName');
  if (!val) {
    msg.textContent = 'Bắt buộc nhập tên quán';
    msg.className = 'add-field-msg error';
    input.classList.add('invalid');
    return false;
  }
  msg.textContent = ''; msg.className = 'add-field-msg';
  input.classList.remove('invalid');
  return true;
}
function saveStop() {
  if (!validateName()) return;
  const lat = parseFloat(document.getElementById('asLat').value) || 0;
  const lng = parseFloat(document.getElementById('asLng').value) || 0;
  const gmapUrl = document.getElementById('asGmap').value.trim();
  const gmapMsg = document.getElementById('asGmapMsg');
  const latMsg  = document.getElementById('asLatMsg');
  const saveBtn = document.querySelector('#addModal .add-modal-save');
  const hasWarnGmap  = !gmapUrl;
  const hasWarnCoord = lat === 0 && lng === 0;
  if (_saveStep === 0 && (hasWarnGmap || hasWarnCoord)) {
    if (hasWarnGmap)  { gmapMsg.textContent = 'Chưa có link bản đồ — quán sẽ không có nút pin'; gmapMsg.className = 'add-field-msg warn'; }
    if (hasWarnCoord) { latMsg.textContent  = 'Chưa có toạ độ — quán sẽ không hiện trên bản đồ'; latMsg.className  = 'add-field-msg warn'; }
    _saveStep = 1; saveBtn.textContent = 'Vẫn lưu';
    return;
  }
  gmapMsg.textContent = ''; gmapMsg.className = 'add-field-msg';
  latMsg.textContent  = ''; latMsg.className  = 'add-field-msg';
  openPinModal(doSaveStop);
}
async function doSaveStop() {
  const lat = parseFloat(document.getElementById('asLat').value) || 0;
  const lng = parseFloat(document.getElementById('asLng').value) || 0;
  const gmapUrl = document.getElementById('asGmap').value.trim();
  const name = document.getElementById('asName').value.trim();
  const snackId = DAYS['snack'].id;
  const { data: existing } = await sb.from('stops').select('stop_number').eq('day_id', snackId).order('stop_number', { ascending: false }).limit(1);
  const nextNum = (existing && existing.length > 0) ? existing[0].stop_number + 1 : 1;
  const { error } = await sb.from('stops').insert({
    day_id: snackId, stop_number: nextNum, lat, lng, name,
    chinese_name: document.getElementById('asCn').value.trim() || null,
    note: document.getElementById('asNote').value.trim() || null,
    address: document.getElementById('asAddr').value.trim() || null,
    gmap_url: gmapUrl || null,
    stop_type: ['ăn uống'], time_label: null
  });
  if (error) { alert('Lỗi: ' + error.message); return; }
  const { data: allStops } = await sb.from('stops').select('*').eq('day_id', snackId).order('stop_number');
  const sheetBody = document.querySelector('#ssnack .sheet-body');
  if (sheetBody) sheetBody.innerHTML = renderSheetBody('snack', allStops, {});
  if (lat !== 0 || lng !== 0) {
    const [wlat, wlng] = gcj2wgs(lat, lng);
    const marker = L.marker([wlat, wlng], { icon: mkIcon(DAYS['snack'].color, nextNum) }).addTo(map);
    marker.bindPopup(`<div class="popup-name">${name}</div><div class="popup-time"></div>`);
    layers.push(marker);
    DAYS['snack'].pts.push([lat, lng, name, '']);
  }
  closeAddStop();
}

// ── EDIT STOP ──
function openEditStop(id) {
  const stop = _snackStopsMap[id];
  if (!stop) return;
  _editId = id;
  document.getElementById('eName').value = stop.name || '';
  document.getElementById('eCn').value   = stop.chinese_name || '';
  document.getElementById('eNote').value = stop.note || '';
  document.getElementById('eAddr').value = stop.address || '';
  document.getElementById('eGmap').value = stop.gmap_url || '';
  document.getElementById('eLat').value  = stop.lat || '';
  document.getElementById('eLng').value  = stop.lng || '';
  const msg = document.getElementById('eNameMsg');
  msg.textContent = ''; msg.className = 'add-field-msg';
  document.getElementById('eName').classList.remove('invalid');
  document.getElementById('editModal').classList.add('open');
}
function closeEditStop() {
  document.getElementById('editModal').classList.remove('open');
  _editId = null;
}
function validateEditName() {
  const val = document.getElementById('eName').value.trim();
  const msg  = document.getElementById('eNameMsg');
  const input = document.getElementById('eName');
  if (!val) {
    msg.textContent = 'Bắt buộc nhập tên quán'; msg.className = 'add-field-msg error';
    input.classList.add('invalid'); return false;
  }
  msg.textContent = ''; msg.className = 'add-field-msg';
  input.classList.remove('invalid'); return true;
}
function tryExtractEditLatLng(url) {
  const m = url.match(/!3d(-?\d+\.?\d*)!4d(-?\d+\.?\d*)/);
  if (m) { document.getElementById('eLat').value = m[1]; document.getElementById('eLng').value = m[2]; }
}
function saveEdit() {
  if (!validateEditName()) return;
  openPinModal(doSaveEdit);
}
async function doSaveEdit() {
  const lat = parseFloat(document.getElementById('eLat').value) || 0;
  const lng = parseFloat(document.getElementById('eLng').value) || 0;
  const { error } = await sb.from('stops').update({
    name: document.getElementById('eName').value.trim(),
    chinese_name: document.getElementById('eCn').value.trim() || null,
    note: document.getElementById('eNote').value.trim() || null,
    address: document.getElementById('eAddr').value.trim() || null,
    gmap_url: document.getElementById('eGmap').value.trim() || null,
    lat, lng
  }).eq('id', _editId);
  if (error) { alert('Lỗi: ' + error.message); return; }
  const snackId = DAYS['snack'].id;
  const { data: allStops } = await sb.from('stops').select('*').eq('day_id', snackId).order('stop_number');
  const sheetBody = document.querySelector('#ssnack .sheet-body');
  if (sheetBody) sheetBody.innerHTML = renderSheetBody('snack', allStops, {});
  if (activeDay === 'snack') {
    DAYS['snack'].pts = allStops.filter(s => s.show_on_map !== false && (parseFloat(s.lat)||0) !== 0)
      .map(s => [parseFloat(s.lat), parseFloat(s.lng), s.name, s.time_label || '']);
    loadDay('snack');
  }
  closeEditStop();
}
</script>

      <div class="add-field-msg" id="asNameMsg"></div>
    </div>

    <input id="asNote" placeholder="Ghi chú">
    <input id="asAddr" placeholder="Địa chỉ">

      <input id="asGmap" placeholder="Link Google Maps" oninput="tryExtractLatLng(this.value)">
      <div class="add-field-msg" id="asGmapMsg"></div>
    </div>
    <div class="add-field">
      <div class="add-modal-hint">Lat/Lng tự điền nếu link có !3d…!4d…</div>

        <input id="asLat" placeholder="Lat" type="number" step="any">
        <input id="asLng" placeholder="Lng" type="number" step="any">

      <div class="add-field-msg" id="asLatMsg"></div>
    </div>
    <div class="add-modal-actions">
      <button class="add-modal-cancel" onclick="closeAddStop()">Huỷ</button>
      <button class="add-modal-save" onclick="saveStop()">Lưu</button>
    </div>
  </div>
</div>

<div id="editModal" class="add-modal-overlay">
  <div class="add-modal">
    <div class="add-modal-handle"></div>
    <div class="add-modal-title">Sửa quán</div>
    <div class="add-field">
      <input id="eName" placeholder="Tên *" oninput="validateEditName()">
      <div class="add-field-msg" id="eNameMsg"></div>
    </div>
    <input id="eCn" placeholder="Tên tiếng Trung">
    <input id="eNote" placeholder="Ghi chú">
    <input id="eAddr" placeholder="Địa chỉ">
    <div class="add-field">
      <input id="eGmap" placeholder="Link Google Maps" oninput="tryExtractEditLatLng(this.value)">
    </div>
    <div class="add-field">
      <div class="add-modal-hint">Lat/Lng tự điền nếu link có !3d…!4d…</div>
      <div class="add-modal-row">
        <input id="eLat" placeholder="Lat" type="number" step="any">
        <input id="eLng" placeholder="Lng" type="number" step="any">
      </div>
    </div>
    <div class="add-modal-actions">
      <button class="add-modal-cancel" onclick="closeEditStop()">Huỷ</button>
      <button class="add-modal-save" onclick="saveEdit()">Lưu</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<div id="pinModal" class="add-modal-overlay" style="z-index:10001;background:rgba(0,0,0,0.5)">
  <div class="add-modal" style="gap:20px">
    <div class="add-modal-handle"></div>
    <div class="add-modal-title">Nhập PIN</div>
    <div class="add-field">
      <input id="pinInput" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="4"
             autocomplete="off" placeholder="· · · ·"
             style="text-align:center;font-size:26px;letter-spacing:10px;font-weight:700"
             onkeydown="if(event.key==='Enter')confirmPin()">
      <div class="add-field-msg" id="pinInputMsg"></div>
    </div>
    <div class="add-modal-actions">
      <button class="add-modal-cancel" onclick="closePinModal()">Huỷ</button>
      <button class="add-modal-save" onclick="confirmPin()">Xác nhận</button>
    </div>
  </div>
</div>
