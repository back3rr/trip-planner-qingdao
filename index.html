<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Thanh Đảo 青島 · 23–27/4/2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Borel&display=swap');

:root {
  --bg: #0e1117; --card: #1e2535; --border: #2a3347; --surface: #161b26;
  --a23: #4a9eff; --a24: #2ecc8a; --a25: #ff7c4a; --a26: #f5c842; --a27: #c97fff;
  --text: #e8edf5; --muted: #8896b0;
  --hdr-h: 88px;
  --map-h: 50vh;
  --sheet-h: calc(50vh - var(--hdr-h) + 100vh - 50vh);
}
body.light {
  --bg: #f0f4f8; --card: #ffffff; --border: #d0d8e8; --surface: #e4eaf4;
  --text: #1a2235; --muted: #6b7a99;
  --a23: #1a7de0; --a24: #1a9966; --a25: #d95a25; --a26: #b08a00; --a27: #8b3ecf;
}

@keyframes sk { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-size: 17px; }

/* ══ HEADER ══ */
.hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 400;
  background: linear-gradient(135deg, rgba(14,17,23,0.78), rgba(20,28,46,0.82));
  backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
  padding: 16px 16px 0; border-bottom: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 -1px 0 rgba(255,255,255,0.06);
}
.hdr-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.ttl {
  font-family: 'Borel', cursive; font-size: 22px; font-weight: 800;
  letter-spacing: -.5px; margin-bottom: -16px;
  background: linear-gradient(90deg, #4a9eff, #c97fff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
.wbadge {
  background: linear-gradient(135deg, rgba(74,158,255,0.15), rgba(201,127,255,0.1));
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-radius: 20px; padding: 0 12px; height: 34px; display: flex; align-items: center; font-size: 14px; color: var(--text);
  box-shadow: 0 4px 20px rgba(74,158,255,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
}
.theme-btn {
  width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15);
  background: linear-gradient(135deg, rgba(74,158,255,0.15), rgba(201,127,255,0.1));
  backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
  box-shadow: 0 4px 20px rgba(74,158,255,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
.theme-btn:active { transform: scale(.9); }
body.light .hdr {
  background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(248,250,255,0.65));
  border-bottom: 1px solid rgba(0,0,0,0.08);

}
body.light .sheet {
  background: rgba(255,255,255,0.6);
  border-top: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.8);

body.light .wbadge {

  border: 1px solid rgba(0,0,0,0.1);

/* ══ TABS ══ */

.tab {
  flex: 1; min-width: 0; padding: 7px 4px; border-radius: 9px 9px 0 0;

.tab[data-d="24"].active { background: rgba(46,204,138,0.12); border-top: 2px solid var(--a24); color: var(--a24); }

  position: fixed;

  z-index: 1;

  width: 100%; height: 100%;
  filter: brightness(.88) saturate(.75);

.sheet-gmap-btn {
  flex-shrink: 0;

  text-decoration: none; color: #fff;
  transition: transform .15s, box-shadow .15s; margin-top: 2px;

.d24 .sheet-gmap-btn { background: linear-gradient(135deg, rgba(46,204,138,0.75), rgba(46,204,138,0.5)); }
.d25 .sheet-gmap-btn { background: linear-gradient(135deg, rgba(255,124,74,0.75), rgba(255,124,74,0.5)); }
.d26 .sheet-gmap-btn { background: linear-gradient(135deg, rgba(245,200,66,0.75), rgba(245,200,66,0.5)); color: #1a1000; }
.d27 .sheet-gmap-btn { background: linear-gradient(135deg, rgba(201,127,255,0.75), rgba(201,127,255,0.5)); }
.sheet {
  position: fixed;
  top: var(--hdr-h); left: 0; right: 0; bottom: 0;
  transform: translateY(calc(100vh - var(--hdr-h) - 50vh));
  transition: transform .38s cubic-bezier(.32,1,.52,1);
  will-change: transform;
  z-index: 200;
  border-radius: 20px 20px 0 0;
  background: rgba(14,17,23,0.80);
  backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%);
  border-top: 1px solid rgba(255,255,255,0.1);
  display: none;
  flex-direction: column;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
}
.sheet.visible { display: flex; }
.sheet.expanded { transform: translateY(0); }

/* drag handle */
.handle-zone {
  flex-shrink: 0; padding: 10px 16px 0;
  cursor: grab; user-select: none;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.handle-zone:active { cursor: grabbing; }
.handle-bar { width: 36px; height: 4px; border-radius: 2px; background: var(--border); }

/* scrollable body */

  flex: 1; overflow-y: auto; overflow-x: hidden;

  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;

}

.stop:active { background: #232d40; }
body.light .stop:active { background: rgba(0,0,0,0.04); }

.smeta { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.b { font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
.bs { background: rgba(245,200,66,.15); color: #f5c842; border: 1px solid rgba(245,200,66,.3); }
.bm { background: rgba(255,80,80,.15);  color: #ff6060; border: 1px solid rgba(255,80,80,.3); }
.bf { background: rgba(46,204,138,.15); color: var(--a24); border: 1px solid rgba(46,204,138,.3); }
.bt { background: rgba(74,158,255,.15); color: var(--a23); border: 1px solid rgba(74,158,255,.3); }
.bb { background: rgba(201,127,255,.15);color: var(--a27); border: 1px solid rgba(201,127,255,.3); }

.sgmap { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; flex-shrink: 0; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); text-decoration: none; margin-top: 1px; align-self: flex-start; }

.ttip { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 7px; }

/* Leaflet popup dark */
.leaflet-popup-content-wrapper { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 10px; font-family: 'Noto Sans SC', sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,.6); }

.leaflet-container a.leaflet-popup-close-button { color: #8896b0; }

<div class="hdr">

    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="wbadge" id="wbadge" style="min-width:72px;color:var(--border);background:linear-gradient(90deg,var(--card) 25%,var(--border) 50%,var(--card) 75%);background-size:200% 100%;animation:sk 1.2s infinite">···</div>

<!-- ══ SHEETS ══ -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── MAP INIT ──
// Use OpenStreetMap tiles (reliable fallback) + CartoDB dark
const map = L.map('mainMap', { zoomControl: false, attributionControl: false });

const TILES = {
  dark:  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  light: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
};
let tileLayer = L.tileLayer(TILES.dark, { subdomains: 'abcd', maxZoom: 19 }).addTo(map);

function switchMapTiles(theme) {
  tileLayer.setUrl(TILES[theme]);
}

// ── GCJ-02 → WGS-84 conversion ──
// Google Maps URLs in China encode coords as GCJ-02 (Mars Coords).
// OSM/CartoDB tiles use WGS-84. Convert before placing markers.
function gcj2wgs(lat, lng) {
  const a = 6378245.0, ee = 0.00669342162296594323;
  const PI = Math.PI;
  function tLat(x, y) {
    let r = -100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));
    r += (20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;
    r += (20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;
    r += (160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;
    return r;
  }
  function tLng(x, y) {
    let r = 300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));
    r += (20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;
    r += (20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;
    r += (150*Math.sin(x/12*PI)+300*Math.sin(x*PI/30))*2/3;
    return r;
  }
  const dlat = tLat(lng-105, lat-35);
  const dlng = tLng(lng-105, lat-35);
  const radlat = lat/180*PI;
  let magic = Math.sin(radlat);
  magic = 1 - ee*magic*magic;
  const sq = Math.sqrt(magic);
  const dlatR = dlat*180/((a*(1-ee))/(magic*sq)*PI);
  const dlngR = dlng*180/(a/sq*Math.cos(radlat)*PI);
  return [lat - dlatR, lng - dlngR];
}

const [initLat, initLng] = gcj2wgs(36.067, 120.322);
map.setView([initLat, initLng], 15);

let layers = [];

const SUPABASE_URL  = 'https://sfmwerurddclcttziweu.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmbXdlcnVyZGRjbGN0dHppd2V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3Mzk2OTcsImV4cCI6MjA5MjMxNTY5N30.ML7Gwv6n1mkkJWZ399nenN1oPmo5OfSUn41_rBrhxN4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let DAYS = {};

// ── SUPABASE FETCH ──
async function loadTripData() {
  const [daysRes, stopsRes, trowsRes] = await Promise.all([
    sb.from('days').select('*').order('sort_order'),
    sb.from('stops').select('*').order('stop_number'),
    sb.from('trows').select('*').order('after_stop')
  ]);
  if (daysRes.error) throw daysRes.error;
  const days = daysRes.data;
  const stopsByDay = {}, trowsByDay = {};
  for (const day of days) {
    stopsByDay[day.id] = (stopsRes.data || []).filter(s => s.day_id === day.id);
    const tmap = {};
    for (const t of (trowsRes.data || []).filter(t => t.day_id === day.id)) tmap[t.after_stop] = t.content;
    trowsByDay[day.id] = tmap;
  }
  return { days, stopsByDay, trowsByDay };
}

function buildDaysMap(days, stopsByDay) {
  const result = {};
  for (const day of days) {
    const stops = stopsByDay[day.id] || [];
    result[day.day_key] = {
      color: day.color, zoom: day.map_zoom,
      center: [day.map_center.lat, day.map_center.lng],
      pts: stops.filter(s => s.show_on_map !== false).map(s => [parseFloat(s.lat), parseFloat(s.lng), s.name, s.time_label || '']),
      gmap: day.gmap_url
    };
  }
  return result;
}

// ── RENDER ──
const PIN_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="#8896b0" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
const ROUTE_SVG = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="3,11 22,2 13,21 11,13"/></svg>`;

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function q(s)   { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

const TYPE_ICON = {
  'lưu trú': '🛏️', 'cafe': '☕', 'ăn uống': '🍜',
  'chụp ảnh/tham quan': '📸', 'sân bay': '✈️', 'trạm tàu/ga tàu': '🚄'
};

function renderStop(stop, trow) {
  const icons = (stop.stop_type||[]).map(t => TYPE_ICON[t]||'').filter(Boolean).join('');
  const costBadges = (stop.cost||[]).map(c => `<span class="b bt">${c}</span>`).join('');
  const badges = (stop.badges||[]).map(b => `<span class="b ${b.type}">${b.text}</span>`).join('');
  const allBadges = costBadges + badges;
  return `
<div class="stop" onclick="pin(${stop.lat},${stop.lng},'${q(stop.name)}','${q(stop.time_label)}')">
  <div class="snum">${stop.stop_number}</div>
  <div class="sbody">
    ${stop.time_label ? `<div class="stime">${stop.time_label.slice(-5)}${stop.duration ? ` · ${esc(stop.duration)}` : ''}</div>` : ''}
    <div class="sname">${icons ? `<span class="sico">${icons}</span>` : ''}${esc(stop.name)}</div>
    ${stop.chinese_name ? `<div class="scn">${stop.chinese_name}${stop.address ? ` · ${esc(stop.address)}` : ''}</div>` : stop.address ? `<div class="scn">${esc(stop.address)}</div>` : ''}
    ${stop.note ? `<div class="snote">${stop.note}</div>` : ''}
    ${allBadges ? `<div class="smeta">${allBadges}</div>` : ''}
  </div>
  ${stop.gmap_url ? `<a class="sgmap" href="${esc(stop.gmap_url)}" target="_blank" onclick="event.stopPropagation()">${PIN_SVG}</a>` : ''}
</div>${trow ? `<div class="trow">${esc(trow)}</div>` : ''}`;
}

function timeSection(timeLabel) {
  if (!timeLabel) return null;
  const hh = parseInt(timeLabel.slice(-5, -3), 10);
  if (hh < 12) return 'SÁNG';
  if (hh < 14) return 'TRƯA';
  if (hh < 19) return 'CHIỀU';
  return 'TỐI';
}

function renderSheetBody(dayKey, stops, trowMap) {
  let html = '';
  let lastSection = null;
  for (const stop of stops) {
    const section = timeSection(stop.time_label);
    if (section && section !== lastSection) {
      if (lastSection !== null) html += '</div>';
      html += `<div class="slbl">${section}</div><div class="stops">`;
      lastSection = section;
    } else if (section && lastSection === null) {
      html += `<div class="slbl">${section}</div><div class="stops">`;
      lastSection = section;
    }
    html += renderStop(stop, trowMap[stop.stop_number]);
  }
  if (lastSection !== null) html += '</div>';
  if (dayKey === '27') html += renderDay27Tips();
  return html;
}

function renderSheet(day, stops, trowMap, isFirst) {
  const dk = day.day_key;
  return `<div class="sheet d${dk}${isFirst ? ' visible' : ''}" id="s${dk}" style="display:${isFirst?'flex':'none'}">
  <div class="handle-zone" id="hz${dk}">
    <div class="handle-bar"></div>
    <div class="day-info">
      <div class="day-info-text">
        <div class="dlbl">${esc(day.label)}</div>
        <div class="dtitle">${esc(day.title)}</div>
        ${day.description ? `<div class="ddesc">${esc(day.description)}</div>` : ''}
      </div>
      <a class="sheet-gmap-btn" href="${esc(day.gmap_url||'')}" target="_blank" onclick="event.stopPropagation()">${ROUTE_SVG}Route</a>
    </div>
  </div>
  <div class="sheet-body">${renderSheetBody(dk, stops, trowMap)}</div>
</div>`;
}

function mkIcon(color, n) {
  return L.divIcon({
    className: '',
    html: `<div style="width:26px;height:26px;background:${color};border-radius:50%;border:2px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.6);font-family:sans-serif">${n}</div>`,
    iconSize:[26,26], iconAnchor:[13,13], popupAnchor:[0,-16]
  });
}

function loadDay(d) {
  layers.forEach(l => map.removeLayer(l));
  layers = [];
  const data = DAYS[d];
  // Convert center GCJ02→WGS84 for map view
  const [clat, clng] = gcj2wgs(data.center[0], data.center[1]);
  map.flyTo([clat, clng], data.zoom, { duration: .65 });
  data.pts.forEach((p,i) => {
    const [wlat, wlng] = gcj2wgs(p[0], p[1]);
    const m = L.marker([wlat, wlng], { icon: mkIcon(data.color, i+1) }).addTo(map);
    m.bindPopup(`<div class="popup-name">${p[2]}</div><div class="popup-time">${p[3]}</div>`);
    layers.push(m);
  });
  if (data.pts.length > 1) {
    const latlngs = data.pts.map(p => { const [w0,w1] = gcj2wgs(p[0],p[1]); return [w0,w1]; });
    const line = L.polyline(latlngs, {
      color: data.color, weight: 2.5, opacity: .65, dashArray: '6,5'
    }).addTo(map);
    layers.push(line);
  }
}

function pin(lat, lng, name, time) {
  if (expanded && activeSheet) expand(activeSheet, false);
  const [wlat, wlng] = gcj2wgs(lat, lng);
  map.flyTo([wlat, wlng], 17, { duration: .7 });
  L.popup().setLatLng([wlat, wlng])
    .setContent(`<div class="popup-name">${name}</div><div class="popup-time">${time}</div>`)
    .openOn(map);
}

// ── SHEET DRAG ──
let activeDay = '23';
let activeSheet = null;
let expanded = false;
let dragging = false;
let startY = 0;

function measureHdr() {
  const hdrH = document.querySelector('.hdr').offsetHeight;
  document.documentElement.style.setProperty('--hdr-h', hdrH + 'px');
  return hdrH;
}

function getCollapsedY(sheet) {
  // sheet.offsetHeight = 100vh - hdrH (actual pixels)
  // collapsed: show 50vh → translateY = sheetH - 50vh
  return sheet.offsetHeight - window.innerHeight * 0.5;
}

function getExpandedY() {
  return 0; // translateY(0): sheet top = 100vh - sheetH = hdrH ✓
}

function expand(sheet, yes) {
  sheet.style.transition = 'transform .38s cubic-bezier(.32,1,.52,1)';
  if (yes) {
    sheet.style.transform = 'translateY(0)';
  } else {
    sheet.style.transform = `translateY(${getCollapsedY(sheet)}px)`;
    sheet.querySelector('.sheet-body').scrollTop = 0;
  }
  expanded = yes;
}

function initSheet(d) {
  const sheet = document.getElementById('s' + d);
  const hz = document.getElementById('hz' + d);
  const body = sheet.querySelector('.sheet-body');
  if (sheet._dragInit) return sheet;
  sheet._dragInit = true;

  function start(y) { startY = y; dragging = false; sheet.style.transition = 'none'; }
  function move(y) {
    const dy = y - startY;
    if (!dragging) {
      if (Math.abs(dy) < 5) return;
      dragging = true;
    }
    const colY = getCollapsedY(sheet);
    if (expanded) {
      if (dy > 0) sheet.style.transform = `translateY(${Math.min(colY, dy)}px)`;
    } else {
      if (dy < 0) sheet.style.transform = `translateY(${Math.max(0, colY + dy)}px)`;
    }
  }
  function end(y) {
    if (!dragging) return;
    const dy = y - startY;
    expand(sheet, expanded ? dy < 60 : dy < -50);
    dragging = false;
  }

  // Handle zone: always drag to expand/collapse
  hz.addEventListener('touchstart', e => start(e.touches[0].clientY), {passive:true});
  hz.addEventListener('touchmove', e => { e.preventDefault(); move(e.touches[0].clientY); }, {passive:false});
  hz.addEventListener('touchend', e => end(e.changedTouches[0].clientY));
  hz.addEventListener('mousedown', e => start(e.clientY));
  document.addEventListener('mousemove', e => { if (dragging) move(e.clientY); });
  document.addEventListener('mouseup', e => { if (dragging) end(e.clientY); });

  // Body touch:
  // - Collapsed: kéo lên bất kỳ đâu để expand
  // - Expanded: kéo xuống chỉ khi đã ở đầu nội dung (scrollTop=0) mới collapse
  let bodyTouchY = 0;
  let bodyScrollTop0 = 0;
  let bodyMode = null; // 'sheet' | 'scroll'

  body.addEventListener('touchstart', e => {
    bodyTouchY = e.touches[0].clientY;
    bodyScrollTop0 = body.scrollTop;
    bodyMode = null;
    if (!expanded) start(e.touches[0].clientY);
  }, {passive:true});

  body.addEventListener('touchmove', e => {
    const dy = e.touches[0].clientY - bodyTouchY;
    if (bodyMode === null && Math.abs(dy) > 5) {
      if (!expanded) {
        bodyMode = dy < 0 ? 'sheet' : 'scroll';
      } else {
        bodyMode = (dy > 0 && bodyScrollTop0 === 0) ? 'sheet' : 'scroll';
        if (bodyMode === 'sheet') start(bodyTouchY);
      }
    }
    if (bodyMode === 'sheet') {
      e.preventDefault();
      move(e.touches[0].clientY);
    }
  }, {passive:false});

  body.addEventListener('touchend', e => {
    if (bodyMode === 'sheet' && dragging) end(e.changedTouches[0].clientY);
    bodyMode = null;
  });

  hz.addEventListener('click', () => { if (!dragging) expand(sheet, !expanded); });
  return sheet;
}

function sw(d) {
  // hide current
  if (activeSheet) { activeSheet.style.display = 'none'; }
  // update tabs
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-d="${d}"]`).classList.add('active');
  activeDay = d;
  expanded = false;
  // show new sheet
  const sheet = document.getElementById('s' + d);
  sheet.style.display = 'flex';
  const colY = getCollapsedY(sheet);
  sheet.style.transition = 'none';
  sheet.style.transform = `translateY(${colY}px)`;
  activeSheet = initSheet(d);
  loadDay(d);
}

// ── INIT ──
window.addEventListener('DOMContentLoaded', async () => {
  measureHdr();

  try {
    const { days, stopsByDay, trowsByDay } = await loadTripData();
    DAYS = buildDaysMap(days, stopsByDay);

    const container = document.getElementById('sheetsContainer');
    container.innerHTML = days.map((day, i) =>
      renderSheet(day, stopsByDay[day.id] || [], trowsByDay[day.id] || {}, i === 0)
    ).join('');

    const firstKey = days[0].day_key;
    const sheet1 = document.getElementById('s' + firstKey);
    sheet1.getBoundingClientRect();
    sheet1.style.transition = 'none';
    sheet1.style.transform = `translateY(${getCollapsedY(sheet1)}px)`;
    activeSheet = initSheet(firstKey);
    activeDay = firstKey;
    loadDay(firstKey);
  } catch(e) {
    console.error('Supabase load error:', e);
    document.getElementById('sheetsContainer').innerHTML =
      `<div style="position:fixed;top:50%;left:0;right:0;text-align:center;color:#8896b0;font-size:13px">Không tải được dữ liệu.<br><button onclick="location.reload()" style="margin-top:10px;padding:8px 16px;border-radius:8px;border:1px solid #2a3347;background:#1e2535;color:#e8edf5;font-size:12px;cursor:pointer">Thử lại</button></div>`;
  }

  setTimeout(() => {
    map.invalidateSize();
    measureHdr();
    if (activeSheet && !expanded) {
      activeSheet.style.transform = `translateY(${getCollapsedY(activeSheet)}px)`;
    }
  }, 300);
});

// ── WEATHER ──
(function() {
  function weatherEmoji(code) {
    if (code === 0) return '☀️';
    if (code <= 3)  return '🌤';
    if (code <= 48) return '🌫';
    if (code <= 67) return '🌧';
    if (code <= 77) return '🌨';
    if (code <= 82) return '🌦';
    return '⛈';
  }
  const badge = document.getElementById('wbadge');
  function clearSkeleton() {
    badge.style.animation = 'none';
    badge.style.background = '';
    badge.style.color = '';
  }
  fetch('https://api.open-meteo.com/v1/forecast?latitude=36.067&longitude=120.322&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Asia%2FShanghai&forecast_days=1')
    .then(r => r.json())
    .then(d => {
      clearSkeleton();
      const min = Math.round(d.daily.temperature_2m_min[0]);
      const max = Math.round(d.daily.temperature_2m_max[0]);
      badge.textContent = `${weatherEmoji(d.daily.weathercode[0])} ${min}–${max}°C`;
    })
    .catch(() => { clearSkeleton(); badge.textContent = '— °C'; });
})();

// ── THEME TOGGLE ──
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  const theme = isLight ? 'light' : 'dark';
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('theme', theme);
  switchMapTiles(theme);
}
(function() {
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = '☀️';
    switchMapTiles('light');
  }
})();

// Re-measure on resize
window.addEventListener('resize', () => {
  measureHdr();
  if (activeSheet) {
    if (!expanded) activeSheet.style.transform = `translateY(${getCollapsedY(activeSheet)}px)`;
  }
  map.invalidateSize();
});
